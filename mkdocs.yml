site_name: 부동산 AI 어드바이저 — 프로젝트 기획
site_description: 대한민국 부동산 RAG 기반 AI 상담/보고서 서비스 기획 문서
docs_dir: docs

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - 홈: index.md
  - 프로젝트 기획서: project_plan.md
  - Phase 1 — RAG MVP:
      - 기획서: phases/1_rag_mvp/1_rag_mvp_plan.md
      - 세부 계획:
          - 1.1 임베딩 데이터 테스트: phases/1_rag_mvp/sub_plan/1_1_embedding_data_test.md
          - 테스트 결과:
              - 시맨틱 검색 테스트 (1차): phases/1_rag_mvp/sub_plan/test_result/20260315_1_sementic_search_test.md
              - 시맨틱 검색 테스트 (2차): phases/1_rag_mvp/sub_plan/test_result/20260315_2_sementic_search_test.md
              - 메타데이터 필터링 테스트: phases/1_rag_mvp/sub_plan/test_result/20260315_3_meta_data_filtering_test.md
              - 임베딩 품질 평가: phases/1_rag_mvp/sub_plan/test_result/20260315_4_embedding_quality_test.md
          - 기술 연구:
              - 한국어 임베딩 모델 비교: phases/1_rag_mvp/tech_research/embedding_models.md
              - Vector Database 비교: phases/1_rag_mvp/tech_research/vector_databases.md
              - Hybrid Search (Dense + BM25): phases/1_rag_mvp/tech_research/hybrid_search_bm25.md
  - Phase 2 — 도메인 온톨로지:
      - 기획서: phases/2_domain_ontology/2_domain_ontology_plan.md
  - 환경 설정:
      - 개요: settings/README.md
      - Qwen3.5-27B 실행 가이드: settings/qwen35_27b_setup.md
      - KURE-v1 임베딩 컨테이너: settings/embedding_container_setup.md
      - Qdrant 벡터 DB 컨테이너: settings/qdrant_container_setup.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: 목차
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
