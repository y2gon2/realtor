site_name: 부동산 AI 어드바이저 — 프로젝트 기획
site_description: 대한민국 부동산 RAG 기반 AI 상담/보고서 서비스 기획 문서
docs_dir: docs

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - 홈: index.md
  - 프로젝트 기획서: project_plan.md
  - Phase 1 — RAG MVP:
      - 기획서: phases/1_rag_mvp/1_rag_mvp_plan.md
      - 세부 계획:
          - 1.1 임베딩 데이터 테스트: phases/1_rag_mvp/sub_plan/1_1_embedding_data_test.md
          - 테스트 결과:
              - 시맨틱 검색 테스트 (1차): phases/1_rag_mvp/sub_plan/test_result/20260315_1_sementic_search_test.md
              - 시맨틱 검색 테스트 (2차): phases/1_rag_mvp/sub_plan/test_result/20260315_2_sementic_search_test.md
              - 메타데이터 필터링 테스트: phases/1_rag_mvp/sub_plan/test_result/20260315_3_meta_data_filtering_test.md
              - 임베딩 품질 평가: phases/1_rag_mvp/sub_plan/test_result/20260315_4_embedding_quality_test.md
          - 기술 연구:
              - 한국어 임베딩 모델 비교: phases/1_rag_mvp/sub_plan/tech_research/embedding_models.md
              - Vector Database 비교: phases/1_rag_mvp/sub_plan/tech_research/vector_databases.md
              - Hybrid Search (Dense + BM25): phases/1_rag_mvp/sub_plan/tech_research/hybrid_search_bm25.md
  - Phase 2 — 도메인 온톨로지:
      - 기획서: phases/2_domain_ontology/2_domain_ontology_plan.md
      - 법령 문서 RAG 전략: phases/2_domain_ontology/3_legal_doc_rag_strategy.md
      - 온톨로지 빌드 + 색인 계획: phases/2_domain_ontology/4_ontology_build_and_index_plan.md
      - 검색 테스트 리포트: phases/2_domain_ontology/5_phase2_search_test_report.md
      - 검색 개선 연구 (외부 사례): phases/2_domain_ontology/6_search_improvement_research.md
      - 보충 1 — Contextual Retrieval:
          - 구현 계획: phases/2_domain_ontology/supplementary_1_contextual_retrieval/01_contextual_retrieval_plan.md
          - Prefix 생성 스크립트: phases/2_domain_ontology/supplementary_1_contextual_retrieval/02_contextual_prefix_script.md
          - Cron Wrapper & YAML: phases/2_domain_ontology/supplementary_1_contextual_retrieval/03_cron_wrapper_and_yaml.md
          - index_phase2 수정 사항: phases/2_domain_ontology/supplementary_1_contextual_retrieval/04_index_phase2_modifications.md
          - 적용 결과 리포트 (확장 테스트): phases/2_domain_ontology/supplementary_1_contextual_retrieval/05_contextual_retrieval_results.md
      - 보충 2 — BGE-M3 Triple-Vector:
          - 전체 계획: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/01_bgem3_triple_vector_plan.md
          - Embedder 설계: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/02_embedder_bgem3_design.md
          - 컬렉션 스키마 + 인덱싱: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/03_collection_schema_and_indexing.md
          - Multi-Stage 검색 파이프라인: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/04_multi_stage_search_pipeline.md
          - 벤치마크 및 Ablation Study: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/05_benchmark_and_ablation.md
          - 결과 분석: phases/2_domain_ontology/supplementary_2_bge_m3_triple_vector/06_results_and_analysis.md
      - 조사 자료:
          - 5개 협회·단체 자료수집 조사: phases/2_domain_ontology/research/5개협회단체_RAG자료수집_조사결과.md
          - HF 주택금융공사 조사 방법론: phases/2_domain_ontology/research/HF_HUG_RAG_조사방법론_사이트목록.md
          - HUG 주택도시보증공사 조사 방법론: phases/2_domain_ontology/research/HUG_주택도시보증공사_RAG_조사방법론_사이트목록.md
          - 국토교통부 통계누리 CSV 처리: phases/2_domain_ontology/research/국토교통부_통계누리_CSV처리_결과.md
  - 환경 설정:
      - 개요: settings/README.md
      - Qdrant 벡터 DB 컨테이너: settings/qdrant_container_setup.md
      - KURE-v1 임베딩 컨테이너: settings/embedding_container_setup.md
      - Qwen3.5-27B 실행 가이드: settings/qwen35_27b_setup.md
      - Nemotron3 Super 120B 실행 가이드: settings/nemotron3_super_120b_setup.md
      - Gemini CLI Cron 설정: settings/gemini_cron_setup.md
      - Codex CLI Cron 설정: settings/codex_cron_setup.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: 목차
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
